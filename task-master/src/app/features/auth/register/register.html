<div class="register-container">
    <h1 class="title">Task Master</h1>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm" class="register-form">
        <input
            type="text"
            name="username"
            placeholder="Email"
            [(ngModel)]="username"
            required>
        <input
            type="password"
            name="password"
            placeholder="Password"
            [(ngModel)]="password"
            required>

        <button type="submit" [disabled]="registerForm.invalid" class="submit-button">Register</button>
    </form>
    <p class="error-message">{{ errorMessage }}</p>
    <a routerLink="/login">Login</a>
</div>
