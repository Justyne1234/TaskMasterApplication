<div class="task-container">

    <h2 class="title">{{ isEditMode ? 'Edit' : 'Create' }} Task</h2>

    <form class="task-form" [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>Title<span class="required">*</span></label>
            <input type="text" formControlName="title" class="create-task-input" />
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea formControlName="description" class="create-task-input"></textarea>
        </div>

        <div class="form-group">
            <label>Due Date</label>
            <input type="date" formControlName="dueDate" class="create-task-input" />
        </div>

        <div class="form-group">
            <label>Priority<span class="required">*</span></label>
            <select formControlName="priority" class="create-task-input">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select formControlName="category" class="create-task-input">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Family">Family</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status<span class="required">*</span></label>
            <select formControlName="status" class="create-task-input">
                <option value="ToDo">To Do</option>
                <option value="InProgress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>

        <button type="submit" [disabled]="form.invalid" class="submit-button">
            {{ isEditMode ? 'Edit' : 'Create' }} Task
        </button>
        <button class="cancel-button" (click)="back()">Cancel</button>
    </form>
</div>
